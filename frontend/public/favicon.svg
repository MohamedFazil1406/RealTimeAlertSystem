<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>

  <!-- Geofence -->
  <circle
    cx="32"
    cy="28"
    r="18"
    fill="none"
    stroke="#22C55E"
    stroke-width="2.5"
    stroke-dasharray="3 3"
  />

  <!-- Location Pin -->
  <path
    d="M32 12
       C25 12 20 17 20 24
       C20 34 32 48 32 48
       C32 48 44 34 44 24
       C44 17 39 12 32 12Z"
    fill="url(#pin)"
  />

  <!-- Pin Center -->
  <circle cx="32" cy="24" r="5" fill="#FFFFFF"/>

  <!-- Vehicle -->
  <rect x="24" y="46" width="16" height="6" rx="2" fill="#F8FAFC"/>
  <circle cx="27" cy="53" r="2" fill="#94A3B8"/>
  <circle cx="37" cy="53" r="2" fill="#94A3B8"/>
</svg>