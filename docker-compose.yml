version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geofence-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geofence

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geofence"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mon9ters/geofence-backend:latest

    container_name: geofence-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./backend/.env

    ports:
      - "8080:8080"

  frontend:
    image: mon9ters/geofence-frontend:latest

    container_name: geofence-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data:
