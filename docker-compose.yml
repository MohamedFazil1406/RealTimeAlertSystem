version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4

    container_name: geofence-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geofence

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: geofence-backend

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend

    container_name: geofence-frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data:
